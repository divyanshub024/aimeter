name: macOS CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -project AIMeter.xcodeproj -scheme AIMeter -destination "platform=macOS" -derivedDataPath ./.derived build

      - name: Test
        run: xcodebuild -project AIMeter.xcodeproj -scheme AIMeter -destination "platform=macOS" -derivedDataPath ./.derived test
