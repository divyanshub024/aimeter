<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AIMeter settings screenshot</title>
  <desc id="desc">Synthetic screenshot of the AIMeter settings window with Cursor and polling controls.</desc>
  <defs>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0f9ff"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", sans-serif; }
      .section { fill: #334155; font-size: 17px; font-weight: 700; }
      .body { fill: #0f172a; font-size: 17px; }
      .muted { fill: #64748b; font-size: 15px; }
      .value { fill: #16a34a; font-size: 17px; font-weight: 600; }
      .button { fill: #f8fafc; stroke: #cbd5e1; }
      .buttonText { fill: #0f172a; font-size: 15px; font-weight: 600; }
      .primary { fill: #2563eb; }
      .primaryText { fill: #ffffff; font-size: 15px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#background)"/>

  <g filter="url(#shadow)">
    <rect x="340" y="132" width="520" height="460" rx="14" fill="#ffffff" stroke="#d8dee8"/>
    <rect x="340" y="132" width="520" height="46" rx="14" fill="#f8fafc"/>
    <circle cx="364" cy="155" r="6" fill="#ef4444"/>
    <circle cx="386" cy="155" r="6" fill="#f59e0b"/>
    <circle cx="408" cy="155" r="6" fill="#22c55e"/>
    <text x="600" y="161" fill="#0f172a" font-size="16" font-weight="700" text-anchor="middle">AIMeter Settings</text>

    <g transform="translate(366 206)">
      <text x="0" y="0" class="section">Cursor</text>
      <rect x="0" y="16" width="468" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="18" y="51" class="body">Status</text>
      <text x="450" y="51" class="value" text-anchor="end">Connected</text>
      <line x1="18" y1="69" x2="450" y2="69" stroke="#e2e8f0"/>
      <text x="18" y="100" class="body">Last sync</text>
      <text x="450" y="100" fill="#64748b" font-size="17" text-anchor="end">1 minute ago</text>
      <rect x="18" y="116" width="132" height="32" rx="8" class="primary"/>
      <text x="84" y="137" class="primaryText" text-anchor="middle">Reconnect</text>
      <rect x="162" y="116" width="112" height="32" rx="8" class="button"/>
      <text x="218" y="137" class="buttonText" text-anchor="middle">Disconnect</text>
      <text x="18" y="184" class="muted">Uses a local Cursor web session in this app. No API key is required.</text>
    </g>

    <g transform="translate(366 426)">
      <text x="0" y="0" class="section">Polling</text>
      <rect x="0" y="16" width="468" height="70" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="18" y="59" class="body">Refresh interval</text>
      <rect x="326" y="34" width="124" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="388" y="56" fill="#0f172a" font-size="16" font-weight="700" text-anchor="middle">5 min</text>
    </g>
  </g>

  <text x="600" y="628" fill="#64748b" font-size="15" text-anchor="middle">Synthetic data shown for public documentation</text>
</svg>
