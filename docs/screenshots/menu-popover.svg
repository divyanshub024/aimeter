<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AIMeter menu bar dashboard screenshot</title>
  <desc id="desc">Synthetic screenshot of the AIMeter menu bar popover showing Cursor usage.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e9f1ff"/>
      <stop offset="0.48" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef8f4"/>
    </linearGradient>
    <linearGradient id="menu" x1="0" y1="0" x2="0" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity="0.78"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", sans-serif; }
      .small { fill: #64748b; font-size: 17px; }
      .title { fill: #0f172a; font-size: 25px; font-weight: 700; }
      .percent { fill: #0f172a; font-size: 25px; font-weight: 700; }
      .button { fill: #f8fafc; stroke: #cbd5e1; }
      .buttonText { fill: #0f172a; font-size: 16px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#wallpaper)"/>
  <rect width="1200" height="42" fill="url(#menu)"/>
  <text x="24" y="27" fill="#0f172a" font-size="15" font-weight="700">AIMeter</text>
  <text x="994" y="27" fill="#334155" font-size="14">Tue 1:20 PM</text>
  <rect x="1084" y="12" width="34" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="1088" y="15" width="22" height="8" rx="4" fill="#3b82f6"/>

  <g filter="url(#shadow)">
    <rect x="420" y="84" width="360" height="470" rx="14" fill="#ffffff" stroke="#d8dee8"/>
    <g transform="translate(434 99)">
      <text x="0" y="18" fill="#0f172a" font-size="18" font-weight="700">AIMeter</text>
      <circle cx="326" cy="12" r="7" fill="#e5e7eb"/>
      <path d="M323 12H329M326 9V15" stroke="#64748b" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="0" y1="42" x2="332" y2="42" stroke="#e2e8f0"/>

      <g transform="translate(0 64)">
        <rect width="332" height="206" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="18" y="30" class="small">Cursor</text>
        <text x="18" y="62" class="title">Included in Pro+</text>
        <text x="18" y="88" fill="#16a34a" font-size="16" font-weight="600">Connected</text>
        <text x="314" y="62" class="percent" text-anchor="end">13%</text>
        <rect x="18" y="106" width="296" height="9" rx="4.5" fill="#dbeafe"/>
        <rect x="18" y="106" width="38" height="9" rx="4.5" fill="#2563eb"/>
        <rect x="18" y="132" width="140" height="54" rx="10" fill="#eef2ff"/>
        <text x="32" y="153" fill="#64748b" font-size="15">Auto</text>
        <text x="32" y="176" fill="#0f172a" font-size="21" font-weight="700">4%</text>
        <rect x="174" y="132" width="140" height="54" rx="10" fill="#eff6ff"/>
        <text x="188" y="153" fill="#64748b" font-size="15">API</text>
        <text x="188" y="176" fill="#0f172a" font-size="21" font-weight="700">48%</text>
      </g>

      <text x="0" y="306" class="small">Last sync: 1 minute ago</text>
      <g transform="translate(0 330)">
        <rect x="0" y="0" width="76" height="32" rx="8" class="button"/>
        <text x="38" y="21" class="buttonText" text-anchor="middle">Refresh</text>
        <rect x="88" y="0" width="94" height="32" rx="8" fill="#2563eb"/>
        <text x="135" y="21" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Reconnect</text>
        <rect x="194" y="0" width="104" height="32" rx="8" class="button"/>
        <text x="246" y="21" class="buttonText" text-anchor="middle">Disconnect</text>
      </g>

      <line x1="0" y1="382" x2="332" y2="382" stroke="#e2e8f0"/>
      <text x="0" y="410" class="small">Last dashboard sync: 1 minute ago</text>
      <rect x="274" y="392" width="58" height="32" rx="8" class="button"/>
      <text x="303" y="413" class="buttonText" text-anchor="middle">Quit</text>
    </g>
  </g>

  <text x="600" y="690" fill="#475569" font-size="18" font-weight="600" text-anchor="middle">A quiet menu bar dashboard for Cursor plan usage</text>
  <text x="600" y="718" fill="#64748b" font-size="15" text-anchor="middle">Synthetic data shown for public documentation</text>
</svg>
